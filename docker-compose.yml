version: "3.9"

services:
  smartload:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartload-api
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
